<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>故事库 - AI故事工坊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- 导航栏 -->
    <nav class="bg-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <span class="text-2xl font-bold text-purple-600">📖 AI故事工坊</span>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="index.html" class="text-gray-700 hover:text-purple-600 font-medium">首页</a>
                    <a href="stories.html" class="text-purple-600 font-medium">故事库</a>
                    <a href="editor.html" class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700 font-medium">开始创作</a>
                    <a href="profile.html" class="text-gray-700 hover:text-purple-600 font-medium">个人中心</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主要内容 -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <h1 class="text-3xl font-bold text-center text-gray-900 mb-8">精选故事库</h1>
        
        <div class="grid md:grid-cols-3 gap-6">
            <!-- 示例故事卡片 -->
            <div class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-lg transition">
                <div class="p-6">
                    <h3 class="text-xl font-bold text-gray-900 mb-2">校园寻宝大冒险</h3>
                    <p class="text-gray-600 text-sm mb-4 line-clamp-3">
                        今天放学后，你在教室发现一张神秘纸条，上面写着：学校图书馆藏着一份神秘宝藏……
                    </p>
                    <div class="flex justify-between items-center">
                        <span class="text-xs text-gray-500">AI故事工坊</span>
                        <button onclick="playSampleStory()" class="bg-purple-600 text-white px-3 py-1 rounded text-sm hover:bg-purple-700">
                            开始游玩
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-lg transition">
                <div class="p-6">
                    <h3 class="text-xl font-bold text-gray-900 mb-2">神秘森林探险</h3>
                    <p class="text-gray-600 text-sm mb-4 line-clamp-3">
                        周末，你和朋友来到了传说中的神秘森林，这里据说隐藏着古老的秘密和宝藏……
                    </p>
                    <div class="flex justify-between items-center">
                        <span class="text-xs text-gray-500">小明同学</span>
                        <button onclick="alert('故事即将推出')" class="bg-purple-600 text-white px-3 py-1 rounded text-sm hover:bg-purple-700">
                            开始游玩
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-lg transition">
                <div class="p-6">
                    <h3 class="text-xl font-bold text-gray-900 mb-2">未来科技城</h3>
                    <p class="text-gray-600 text-sm mb-4 line-clamp-3">
                        2150年的未来世界，你是一名天才少年发明家，你的最新发明引起了神秘组织的注意……
                    </p>
                    <div class="flex justify-between items-center">
                        <span class="text-xs text-gray-500">小红同学</span>
                        <button onclick="alert('故事即将推出')" class="bg-purple-600 text-white px-3 py-1 rounded text-sm hover:bg-purple-700">
                            开始游玩
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function playSampleStory() {
            window.location.href = 'play.html';
        }
    </script>
</body>
</html>
