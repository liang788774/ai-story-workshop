<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - AI故事工坊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- 导航栏 -->
    <nav class="bg-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <span class="text-2xl font-bold text-purple-600">📖 AI故事工坊</span>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="index.html" class="text-gray-700 hover:text-purple-600 font-medium">首页</a>
                    <a href="stories.html" class="text-gray-700 hover:text-purple-600 font-medium">故事库</a>
                    <a href="editor.html" class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700 font-medium">开始创作</a>
                    <a href="profile.html" class="text-purple-600 font-medium">个人中心</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主要内容 -->
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="bg-white rounded-lg shadow-md p-8">
            <div class="text-center mb-8">
                <div class="w-24 h-24 bg-purple-100 rounded-full flex items-center justify-center text-4xl mx-auto mb-4">
                    👦
                </div>
                <h1 class="text-2xl font-bold text-gray-900">小创作者</h1>
                <p class="text-gray-600">初级故事师 · 已创作 0 个故事</p>
            </div>

            <div class="border-t pt-8">
                <h2 class="text-xl font-bold text-gray-900 mb-4">我的创作</h2>
                <div class="text-center py-8 text-gray-500">
                    <p>你还没有创作任何故事</p>
                    <button onclick="window.location.href='editor.html'" class="mt-4 bg-purple-600 text-white px-6 py-2 rounded-lg hover:bg-purple-700">
                        开始你的第一个创作
                    </button>
                </div>
            </div>

            <div class="border-t pt-8 mt-8">
                <h2 class="text-xl font-bold text-gray-900 mb-4">最近游玩</h2>
                <div class="text-center py-8 text-gray-500">
                    <p>你还没有游玩任何故事</p>
                    <button onclick="window.location.href='stories.html'" class="mt-4 bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
                        去故事库看看
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
